services:
  backend:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    depends_on:
      - backend
